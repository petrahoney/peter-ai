<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETER AI Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0d1117; color:#c9d1d9;
    font-family:'Segoe UI',sans-serif; font-size:14px;
}
header {
    background:#161b22; border-bottom:1px solid #30363d;
    padding:16px 24px; display:flex;
    align-items:center; justify-content:space-between;
}
.logo { color:#3fb950; font-size:1.3rem; font-weight:700; }
.status { color:#3fb950; font-size:12px; }
.container { display:grid; grid-template-columns:1fr 350px; gap:16px; padding:16px; height:calc(100vh - 60px); }
.chat-area { display:flex; flex-direction:column; background:#161b22; border:1px solid #30363d; border-radius:8px; overflow:hidden; }
.chat-messages { flex:1; overflow-y:auto; padding:16px; }
.msg { margin-bottom:14px; }
.msg-user { text-align:right; }
.msg-bubble { display:inline-block; padding:10px 14px; border-radius:8px; max-width:80%; line-height:1.5; }
.msg-user .msg-bubble { background:#1f6feb; color:#fff; }
.msg-peter .msg-bubble { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }
.msg-name { font-size:11px; color:#8b949e; margin-bottom:4px; }
.chat-input { padding:12px; border-top:1px solid #30363d; display:flex; gap:8px; }
.chat-input input { flex:1; background:#21262d; border:1px solid #30363d; border-radius:6px; padding:10px 14px; color:#c9d1d9; font-size:13px; outline:none; }
.chat-input input:focus { border-color:#1f6feb; }
.chat-input button { background:#1f6feb; color:#fff; border:none; border-radius:6px; padding:10px 18px; cursor:pointer; font-size:13px; }
.chat-input button:hover { background:#388bfd; }
.sidebar { display:flex; flex-direction:column; gap:12px; }
.card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:14px; }
.card-title { font-size:12px; color:#8b949e; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
.stat { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #21262d; font-size:13px; }
.stat:last-child { border-bottom:none; }
.stat-val { color:#3fb950; font-weight:600; }
.files-list { max-height:200px; overflow-y:auto; }
.file-item { padding:6px 0; border-bottom:1px solid #21262d; font-size:12px; color:#8b949e; }
.file-item:last-child { border-bottom:none; }
.online { display:inline-block; width:8px; height:8px; background:#3fb950; border-radius:50%; margin-right:6px; }
</style>
</head>
<body>

<header>
    <div class="logo">🤖 PETER AI v2.3-v4.0 (Bridge)</div>
    <div class="status"><span class="online"></span> <span id="status-text">Connecting...</span></div>
</header>

<div class="container">
    <div class="chat-area">
        <div class="chat-messages" id="chat-messages">
            <div class="msg msg-peter">
                <div class="msg-name">PETER</div>
                <div class="msg-bubble">Halo! Saya PETER, asisten AI pribadi kamu. Apa yang bisa saya bantu?</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="msg-input" placeholder="Ketik perintah untuk PETER..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()">Kirim</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <div class="card-title">Status Sistem</div>
            <div class="stat"><span>Mode</span><span class="stat-val" id="sys-mode">-</span></div>
            <div class="stat"><span>User</span><span class="stat-val" id="sys-user">-</span></div>
            <div class="stat"><span>Waktu</span><span class="stat-val" id="sys-time">-</span></div>
            <div class="stat"><span>WebSocket</span><span class="stat-val" id="ws-status">-</span></div>
        </div>

        <div class="card">
            <div class="card-title">File Output Terbaru</div>
            <div class="files-list" id="files-list">
                <div class="file-item">Memuat...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Quick Commands</div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <button onclick="quickCmd('Riset topik YouTube viral hari ini')" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px;cursor:pointer;font-size:12px;text-align:left">🔍 Riset Topik Viral</button>
                <button onclick="quickCmd('Buat script YouTube 8 menit tentang AI terbaru')" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px;cursor:pointer;font-size:12px;text-align:left">📝 Buat Script YouTube</button>
                <button onclick="quickCmd('Analisis strategi monetisasi konten saya')" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px;cursor:pointer;font-size:12px;text-align:left">💰 Strategi Monetisasi</button>
                <button onclick="quickCmd('Buat grafik pertumbuhan channel 12 bulan')" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px;cursor:pointer;font-size:12px;text-align:left">📊 Buat Grafik</button>
            </div>
        </div>
    </div>
</div>

<script>
let ws = null;

function connect() {
    ws = new WebSocket('ws://localhost:9000/ws');

    ws.onopen = () => {
        document.getElementById('status-text').textContent = 'Online';
        document.getElementById('ws-status').textContent   = 'Connected';
        loadStatus();
        loadFiles();
    };

    ws.onclose = () => {
        document.getElementById('status-text').textContent = 'Offline';
        document.getElementById('ws-status').textContent   = 'Disconnected';
        setTimeout(connect, 3000);
    };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'response') {
            addMessage('peter', data.message);
        }
    };
}

function addMessage(role, text) {
    const div  = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.innerHTML = `
        <div class="msg-name">${role === 'peter' ? 'PETER' : 'Kamu'}</div>
        <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
    `;
    const chat = document.getElementById('chat-messages');
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMsg() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !ws) return;
    addMessage('user', text);
    ws.send(JSON.stringify({type: 'chat', message: text}));
    input.value = '';
    addMessage('peter', '⏳ Berpikir...');
}

function quickCmd(cmd) {
    document.getElementById('msg-input').value = cmd;
    sendMsg();
}

async function loadStatus() {
    try {
        const r = await fetch('/api/status');
        const d = await r.json();
        document.getElementById('sys-mode').textContent = 'Cloud';
        document.getElementById('sys-user').textContent = d.user;
        document.getElementById('sys-time').textContent = d.time;
    } catch(e) {}
}

async function loadFiles() {
    try {
        const r     = await fetch('/api/files');
        const d     = await r.json();
        const list  = document.getElementById('files-list');
        if (d.files.length === 0) {
            list.innerHTML = '<div class="file-item">Belum ada file</div>';
            return;
        }
        list.innerHTML = d.files.slice(-5).reverse().map(f =>
            `<div class="file-item">📄 ${f.name}<br><span style="color:#6e7681">${f.date}</span></div>`
        ).join('');
    } catch(e) {}
}

// Update waktu setiap detik
setInterval(() => {
    document.getElementById('sys-time').textContent =
        new Date().toLocaleTimeString('id-ID');
}, 1000);

connect();
</script>
</body>
</html>
